<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo de Estudos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: rgba(255,255,255,0.08);
    --accent: #4f9eff;
    --text: #e6edf3;
    --text2: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(79,158,255,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    padding: 2rem 1.25rem;
    text-align: center;
  }
  .icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
  h1 {
    font-size: 1.6rem; font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.4rem;
  }
  .subtitle {
    font-size: 0.88rem; color: var(--text2);
    margin-bottom: 2.5rem;
    line-height: 1.6;
  }
  .cards { display: flex; flex-direction: column; gap: 1rem; }
  .card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.4rem 1.5rem;
    text-decoration: none;
    text-align: left;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .card:hover {
    border-color: rgba(79,158,255,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .card-icon { font-size: 1.6rem; margin-bottom: 0.6rem; display: block; }
  .card-title {
    font-size: 1.05rem; font-weight: 600;
    color: var(--text); margin-bottom: 0.3rem;
  }
  .card-desc { font-size: 0.82rem; color: var(--text2); line-height: 1.5; }
  .card-arrow {
    display: flex; justify-content: flex-end;
    margin-top: 0.75rem;
    color: var(--accent); font-size: 0.85rem; font-weight: 500;
  }
  .footer {
    margin-top: 2rem;
    font-size: 0.75rem; color: var(--text2);
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="container">
  <span class="icon">✦</span>
  <h1>Grupo de Estudos</h1>
  <p class="subtitle">Bem-vindo! Escolha uma das opções abaixo.</p>

  <div class="cards">
    <a href="cadastro.html" class="card">
      <span class="card-icon">📋</span>
      <div class="card-title">Fazer meu cadastro</div>
      <div class="card-desc">Informe seu nome e localização para aparecer no mapa do grupo.</div>
      <div class="card-arrow">Acessar →</div>
    </a>

    <a href="mapa.html" target="_blank" class="card">
      <span class="card-icon">🗺️</span>
      <div class="card-title">Ver o mapa do grupo</div>
      <div class="card-desc">Veja onde estão os membros do grupo espalhados pelo mundo.</div>
      <div class="card-arrow">Acessar →</div>
    </a>
  </div>

  <p class="footer">Grupo de Estudos · Mapa colaborativo</p>
</div>
</body>
</html>
